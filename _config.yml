# Thứ tự menu hiển thị trên header
header_pages:
  - about.markdown
  - portfolio.markdown
  - blog.markdown

grid_pages:
  - about.markdown
  - portfolio.markdown
  
# Sass - tắt deprecation warnings từ theme cũ
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions
    - slash-div

# Build settings
theme: minima

plugins:
 - jekyll-feed
 - jekyll-seo-tag
